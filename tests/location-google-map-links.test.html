<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Tests: location-google-map-links</title>
  <script type="importmap">
    { "imports": { "fast-check": "https://cdn.jsdelivr.net/npm/fast-check@3/lib/esm/fast-check.js" } }
  </script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f8fafc; color: #1e293b; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 32px; }
    .result { border-radius: 10px; padding: 16px 20px; margin-bottom: 16px; border: 1px solid; }
    .result.pass { background: #f0fdf4; border-color: #86efac; }
    .result.fail { background: #fff1f2; border-color: #fca5a5; }
    .result.running { background: #f8fafc; border-color: #cbd5e1; }
    .result-header { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 1rem; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 0.78rem; font-weight: 700; }
    .badge.pass { background: #22c55e; color: #fff; }
    .badge.fail { background: #ef4444; color: #fff; }
    .badge.running { background: #94a3b8; color: #fff; }
    .detail { margin-top: 10px; font-size: 0.85rem; color: #475569; }
    .counterexample { margin-top: 8px; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 6px; padding: 10px 14px; font-family: monospace; font-size: 0.82rem; color: #b91c1c; white-space: pre-wrap; word-break: break-all; }
    .summary { margin-top: 32px; padding: 16px 20px; border-radius: 10px; font-weight: 700; font-size: 1.1rem; text-align: center; }
    .summary.all-pass { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    .summary.has-fail { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }
    .req-tag { font-size: 0.75rem; color: #6366f1; font-weight: 500; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>🗺️ Property Tests: location-google-map-links</h1>
  <p class="subtitle">5 個屬性測試，每個最少執行 100 次迭代。直接在瀏覽器開啟即可執行。</p>
  <div id="results"></div>
  <div id="summary"></div>

  <script type="module">
    import * as fc from 'fast-check';
    // ─── 受測函式（從 index.html 複製）───────────────────────────────────────
    function buildMapsLink(name, lat, lng) {
      const BASE = 'https://www.google.com/maps/search/?api=1&query=';
      if (typeof lat === 'number' && !isNaN(lat) &&
          typeof lng === 'number' && !isNaN(lng)) {
        return `${BASE}${lat},${lng}`;
      }
      return `${BASE}${encodeURIComponent(name)}`;
    }

    // ─── 最小化活動卡片渲染（從 index.html 提取，用於屬性 3 & 4）────────────
    function renderActivityCard(act, isSel, isEditing) {
      const isEvent = act.type === 'event';
      return `<h4 class="font-bold text-base mb-1 flex items-center gap-2 ${isSel ? 'text-blue-900' : isEvent ? 'text-amber-700' : 'text-slate-800'}">
    <span class="cursor-pointer">${act.name}</span>
    <a href="${buildMapsLink(act.name, act.lat, act.lng)}"
       target="_blank"
       rel="noopener noreferrer"
       class="text-slate-400 hover:text-blue-500 transition-colors flex-shrink-0"
       title="在 Google Maps 開啟">
      <i data-lucide="map-pin" class="w-4 h-4"></i>
    </a>
  </h4>`;
    }

    // ─── 測試執行器 ──────────────────────────────────────────────────────────
    const MAPS_BASE = 'https://www.google.com/maps/search/';
    const results = [];

    function runProperty(id, label, reqTag, fn) {
      const el = document.createElement('div');
      el.className = 'result running';
      el.id = `prop-${id}`;
      el.innerHTML = `
        <div class="result-header">
          <span class="badge running">⏳</span>
          <span>Property ${id}: ${label}</span>
        </div>
        <div class="req-tag">${reqTag}</div>
        <div class="detail">執行中…</div>
      `;
      document.getElementById('results').appendChild(el);

      let passed = false;
      let errorMsg = '';
      let counterexample = '';

      try {
        fn();
        passed = true;
      } catch (e) {
        passed = false;
        errorMsg = e.message || String(e);
        // fast-check 的反例資訊在 e.counterexample 或訊息中
        if (e.counterexample !== undefined) {
          counterexample = JSON.stringify(e.counterexample, null, 2);
        } else {
          counterexample = errorMsg;
        }
      }

      results.push(passed);

      el.className = `result ${passed ? 'pass' : 'fail'}`;
      el.innerHTML = `
        <div class="result-header">
          <span class="badge ${passed ? 'pass' : 'fail'}">${passed ? '✓ PASS' : '✗ FAIL'}</span>
          <span>Property ${id}: ${label}</span>
        </div>
        <div class="req-tag">${reqTag}</div>
        ${passed
          ? `<div class="detail">所有迭代均通過（numRuns: 100）</div>`
          : `<div class="detail">測試失敗：${errorMsg}</div>
             <div class="counterexample">反例（Counterexample）：\n${counterexample}</div>`
        }
      `;
    }

    // ─── 屬性 1：有效座標產生座標格式 URL ────────────────────────────────────
    // Feature: location-google-map-links, Property 1: 有效座標產生座標格式 URL
    // Validates: Requirements 1.1, 4.3
    runProperty(1, '有效座標產生座標格式 URL', '驗證需求：1.1、4.3', () => {
      fc.assert(fc.property(
        fc.string({ minLength: 1 }),
        fc.double({ min: -90, max: 90, noNaN: true, noDefaultInfinity: true }),
        fc.double({ min: -180, max: 180, noNaN: true, noDefaultInfinity: true }),
        (name, lat, lng) => {
          const url = buildMapsLink(name, lat, lng);
          return url.includes(`query=${lat},${lng}`);
        }
      ), { numRuns: 100 });
    });

    // ─── 屬性 2：缺少座標時退回名稱搜尋 ─────────────────────────────────────
    // Feature: location-google-map-links, Property 2: 缺少座標時退回名稱搜尋
    // Validates: Requirements 1.2, 1.4, 4.4
    runProperty(2, '缺少座標時退回名稱搜尋', '驗證需求：1.2、1.4、4.4', () => {
      fc.assert(fc.property(
        fc.string({ minLength: 1 }),
        fc.oneof(
          fc.constant(undefined),
          fc.constant(null),
          fc.constant(NaN),
          fc.string({ minLength: 1 })
        ),
        fc.oneof(
          fc.constant(undefined),
          fc.constant(null),
          fc.constant(NaN),
          fc.string({ minLength: 1 })
        ),
        (name, lat, lng) => {
          const url = buildMapsLink(name, lat, lng);
          return url.includes(`query=${encodeURIComponent(name)}`);
        }
      ), { numRuns: 100 });
    });

    // ─── 屬性 3：所有活動卡片均包含正確的 Maps 連結標籤 ──────────────────────
    // Feature: location-google-map-links, Property 3: 所有活動卡片均包含正確的 Maps 連結標籤
    // Validates: Requirements 2.1, 2.2, 2.3, 1.3
    runProperty(3, '所有活動卡片均包含正確的 Maps 連結標籤', '驗證需求：2.1、2.2、2.3、1.3', () => {
      const activityArb = fc.record({
        name: fc.string({ minLength: 1 }),
        type: fc.oneof(
          fc.constant('sightseeing'),
          fc.constant('shopping'),
          fc.constant('dining'),
          fc.constant('nature'),
          fc.constant('cafe'),
          fc.constant('culture'),
          fc.constant('accommodation'),
          fc.constant('event')
        ),
        lat: fc.oneof(
          fc.double({ min: -90, max: 90, noNaN: true, noDefaultInfinity: true }),
          fc.constant(undefined)
        ),
        lng: fc.oneof(
          fc.double({ min: -180, max: 180, noNaN: true, noDefaultInfinity: true }),
          fc.constant(undefined)
        )
      });

      fc.assert(fc.property(
        fc.array(activityArb, { minLength: 1, maxLength: 10 }),
        fc.boolean(),
        (activities, isSel) => {
          return activities.every(act => {
            const html = renderActivityCard(act, isSel, false);
            const hasHref = html.includes(`href="${MAPS_BASE}`);
            const hasTarget = html.includes('target="_blank"');
            const hasRel = html.includes('rel="noopener noreferrer"');
            return hasHref && hasTarget && hasRel;
          });
        }
      ), { numRuns: 100 });
    });

    // ─── 屬性 4：編輯模式不影響 Maps 連結顯示 ────────────────────────────────
    // Feature: location-google-map-links, Property 4: 編輯模式不影響 Maps 連結顯示
    // Validates: Requirements 2.4
    runProperty(4, '編輯模式不影響 Maps 連結顯示', '驗證需求：2.4', () => {
      const activityArb = fc.record({
        name: fc.string({ minLength: 1 }),
        type: fc.oneof(
          fc.constant('sightseeing'),
          fc.constant('accommodation'),
          fc.constant('event'),
          fc.constant('dining')
        ),
        lat: fc.oneof(
          fc.double({ min: -90, max: 90, noNaN: true, noDefaultInfinity: true }),
          fc.constant(undefined)
        ),
        lng: fc.oneof(
          fc.double({ min: -180, max: 180, noNaN: true, noDefaultInfinity: true }),
          fc.constant(undefined)
        )
      });

      fc.assert(fc.property(
        fc.array(activityArb, { minLength: 1, maxLength: 10 }),
        fc.boolean(), // isEditing
        fc.boolean(), // isSel
        (activities, isEditing, isSel) => {
          return activities.every(act => {
            const html = renderActivityCard(act, isSel, isEditing);
            return html.includes(`href="${MAPS_BASE}`) &&
                   html.includes('target="_blank"') &&
                   html.includes('rel="noopener noreferrer"');
          });
        }
      ), { numRuns: 100 });
    });

    // ─── 屬性 5：buildMapsLink 的冪等性 ──────────────────────────────────────
    // Feature: location-google-map-links, Property 5: buildMapsLink 的冪等性
    // Validates: Requirements 4.2
    runProperty(5, 'buildMapsLink 的冪等性', '驗證需求：4.2', () => {
      fc.assert(fc.property(
        fc.string({ minLength: 1 }),
        fc.oneof(
          fc.double({ noNaN: true, noDefaultInfinity: true }),
          fc.constant(undefined)
        ),
        fc.oneof(
          fc.double({ noNaN: true, noDefaultInfinity: true }),
          fc.constant(undefined)
        ),
        (name, lat, lng) => {
          const url1 = buildMapsLink(name, lat, lng);
          const url2 = buildMapsLink(name, lat, lng);
          return url1 === url2;
        }
      ), { numRuns: 100 });
    });

    // ─── 總結 ─────────────────────────────────────────────────────────────────
    const passed = results.filter(Boolean).length;
    const total = results.length;
    const allPass = passed === total;
    const summaryEl = document.getElementById('summary');
    summaryEl.className = `summary ${allPass ? 'all-pass' : 'has-fail'}`;
    summaryEl.textContent = allPass
      ? `✅ 全部通過：${passed} / ${total} 個屬性測試通過`
      : `❌ 部分失敗：${passed} / ${total} 個屬性測試通過`;
  </script>
</body>
</html>
