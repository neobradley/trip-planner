<!DOCTYPE html>
<html lang="zh-TW" data-version="1.1.1">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="app-version" content="1.1.1">
  <meta name="gemini-model" content="gemini-2.5-flash">
  <!-- 版本守衛：若快取版本不符，強制重新載入 -->
  <script>
    (function() {
      var CURRENT = '1.1.1';
      var cached = sessionStorage.getItem('app-version');
      if (cached && cached !== CURRENT) {
        sessionStorage.setItem('app-version', CURRENT);
        window.location.reload(true);
      } else {
        sessionStorage.setItem('app-version', CURRENT);
      }
    })();
  </script>
  <title>Gemini 實境旅遊規劃系統</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Leaflet.js (真實地圖套件, 免費免Key) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- html2pdf.js (真實 PDF 匯出套件) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    /* Leaflet 自訂 Marker 樣式 */
    .custom-map-marker { background: transparent; border: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

  <!-- 視圖 1: 輸入表單 -->
  <div id="view-form" class="min-h-screen flex items-center justify-center p-4 py-8">
    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
      <div class="bg-slate-900 p-8 text-white text-center relative overflow-hidden">
        <i data-lucide="sparkles" class="w-12 h-12 mx-auto mb-4 text-blue-400 relative z-10 animate-pulse"></i>
        <h1 class="text-3xl font-bold mb-2 relative z-10">Gemini 實境旅程規劃</h1>
        <p class="text-slate-300 relative z-10 text-sm">真實地圖渲染 x 真實 PDF 匯出</p>
      </div>
      
      <form id="main-form" class="p-6 sm:p-8 space-y-8" onsubmit="handleGenerate(event)">
        
        <!-- API Key 設定區塊 (解決查詢失敗) -->
        <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 shadow-sm">
          <label class="block text-sm font-bold text-blue-900 mb-2 flex items-center gap-2">
            <i data-lucide="key" class="w-4 h-4"></i> 請輸入您的 Gemini API Key
          </label>
          <input type="password" id="input-api-key" placeholder="AIzaSy..." class="w-full px-4 py-2.5 rounded-lg border-2 border-blue-200 focus:border-blue-600 outline-none text-sm font-mono" required />
          <p class="text-xs text-blue-600 mt-2">※ 金鑰僅儲存於您的瀏覽器本地端 (localStorage)，絕不外流。</p>
        </div>

        <!-- 基礎資訊 -->
        <div class="space-y-4">
          <div class="relative">
            <i data-lucide="map-pin" class="absolute left-3 top-3 w-5 h-5 text-slate-400"></i>
            <input type="text" id="input-destination" placeholder="想去哪裡？例如：碧瑤, 宿霧, 京都..." class="w-full pl-10 pr-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 outline-none transition-all font-medium" required />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <input type="number" id="input-days" placeholder="想去幾天？" min="1" max="14" value="3" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 outline-none font-medium" />
            <select id="input-partySize" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-blue-500 outline-none bg-white font-medium">
              <option value="1">單人</option>
              <option value="2" selected>雙人</option>
              <option value="3-5">小家庭 (3-5人)</option>
              <option value="6+">大型團體 (6人以上)</option>
            </select>
          </div>
        </div>

        <!-- 住宿安排 -->
        <div class="space-y-4 pt-4 border-t border-slate-100">
          <div class="flex gap-4 mb-2">
            <label class="flex items-center gap-2 cursor-pointer p-3 border-2 rounded-xl flex-1 transition-all hover:bg-slate-50">
              <input type="radio" name="accStatus" value="unknown" checked onchange="updateAccStatus('unknown')" class="w-4 h-4 text-blue-600 accent-blue-600" />
              <span class="text-sm font-medium">請 AI 推薦住宿</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer p-3 border-2 rounded-xl flex-1 transition-all hover:bg-slate-50">
              <input type="radio" name="accStatus" value="known" onchange="updateAccStatus('known')" class="w-4 h-4 text-blue-600 accent-blue-600" />
              <span class="text-sm font-medium">已有飯店安排</span>
            </label>
          </div>
          <div id="acc-container" class="space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-200 hidden fade-in">
            <div id="acc-list"></div>
            <button type="button" onclick="addAccField()" class="text-sm text-blue-600 font-bold flex items-center gap-1 hover:text-blue-800">
              <i data-lucide="plus" class="w-4 h-4"></i> 新增更換飯店
            </button>
          </div>
        </div>

        <!-- 興趣與飲食 -->
        <div class="space-y-3 pt-4 border-t border-slate-100">
          <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2">特別興趣 (BDD 黃金時刻驗證)</h3>
          <div id="interests-container" class="flex flex-wrap gap-2"></div>
        </div>
        <div class="space-y-3 pt-4 border-t border-slate-100">
          <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2">飲食限制 (BDD 團體素食驗證)</h3>
          <div id="dietary-container" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- 鎖定行程 -->
        <div class="space-y-3 pt-4 border-t border-slate-100">
          <div class="flex justify-between items-center">
            <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2"><i data-lucide="anchor" class="w-4 h-4 text-amber-500"></i> 強制鎖定行程 (BDD 錨點驗證)</h3>
            <button type="button" onclick="addFixedEvent()" class="text-sm text-blue-600 font-bold flex items-center gap-1 hover:text-blue-800">
              <i data-lucide="plus" class="w-4 h-4"></i> 加入事件
            </button>
          </div>
          <div id="fixed-events-list" class="space-y-2"></div>
        </div>

        <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-4 rounded-xl font-bold text-lg transition-all flex items-center justify-center gap-2 shadow-lg shadow-slate-300 mt-8">
          執行實時演算 <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
      </form>
    </div>
  </div>

  <!-- 視圖 2: 載入中 -->
  <div id="view-loading" class="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white p-4 hidden">
    <div class="relative w-24 h-24 mb-8">
      <div id="loading-spinner" class="absolute inset-0 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <i id="loading-icon" data-lucide="sparkles" class="absolute inset-0 m-auto w-8 h-8 text-blue-300 animate-pulse"></i>
    </div>
    <h2 id="loading-title" class="text-2xl font-bold mb-4 animate-pulse">正在為您搜尋真實推薦...</h2>
    <div class="space-y-2 text-slate-400 text-sm text-center max-w-md">
      <p id="loading-text1">正在透過 Google Search 擷取真實景點與座標...</p>
      <p id="loading-text2">正在組裝高可用性的 JSON 結構...</p>
      <div id="loading-error-box" class="bg-slate-800 p-4 rounded-xl border border-slate-700 hidden mt-4">
        <p id="loading-error-msg" class="text-rose-400 font-bold mb-2"></p>
        <p class="text-slate-300 mt-3 text-xs">系統將自動載入「本地備用測試資料」，確保您能檢視介面操作。</p>
      </div>
    </div>
  </div>

  <!-- 視圖 3: 儀表板 -->
  <div id="view-dashboard" class="min-h-screen flex flex-col hidden relative overflow-hidden">
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex flex-wrap gap-4 items-center justify-between z-20 shadow-sm">
      <div>
        <h1 class="text-xl font-bold text-slate-900 flex items-center gap-2">
          <i data-lucide="map-pin" class="w-6 h-6 text-blue-600"></i> <span id="dash-dest"></span>
        </h1>
        <div class="flex flex-wrap items-center gap-2 text-sm text-slate-500 mt-1 font-medium" id="dash-tags"></div>
      </div>
      <div class="flex gap-2">
        <button onclick="switchView('form')" class="px-4 py-2 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">重新規劃</button>
        <button onclick="toggleEditing()" id="btn-edit" class="px-4 py-2 text-sm font-bold rounded-lg transition-colors flex items-center gap-2 bg-slate-100 text-slate-700 hover:bg-slate-200">
          <i data-lucide="edit" class="w-4 h-4"></i> <span>微調行程</span>
        </button>
        <button onclick="handleExportPDF()" class="px-4 py-2 text-sm font-bold text-white bg-slate-900 hover:bg-slate-800 rounded-lg transition-colors flex items-center gap-2 shadow-md">
          <i data-lucide="download" class="w-4 h-4"></i> 匯出 PDF
        </button>
      </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
      <!-- 時間軸 (為 PDF 匯出加上 ID) -->
      <div class="w-full md:w-[45%] lg:w-2/5 h-[50vh] md:h-full overflow-y-auto bg-white border-r border-slate-200 p-6 scroll-smooth z-10 custom-scrollbar shadow-lg">
        <div id="pdf-content">
          <div id="timeline-container" class="space-y-8 pb-20"></div>
        </div>
      </div>
      <!-- 真實地圖容器 -->
      <div class="w-full md:w-[55%] lg:w-3/5 h-[50vh] md:h-full relative overflow-hidden flex-1 z-0">
        <div id="real-map" class="absolute inset-0 w-full h-full z-0"></div>
        <div id="edit-badge" class="absolute top-6 left-1/2 transform -translate-x-1/2 bg-amber-500 text-white px-4 py-2 rounded-full text-sm font-bold shadow-lg animate-bounce items-center gap-2 z-40 hidden flex">
          <i data-lucide="edit" class="w-4 h-4"></i> 編輯模式開啟中
        </div>
      </div>
    </main>
    
    <!-- 匯出進度 Modal -->
    <div id="export-modal" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
      <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center fade-in">
        <div class="relative w-16 h-16 mx-auto mb-6"><i data-lucide="loader-2" class="w-16 h-16 text-slate-800 animate-spin"></i></div>
        <h3 class="text-xl font-bold text-slate-900 mb-2">正在產生真實 PDF...</h3>
        <p class="text-slate-500 text-sm mb-6">這可能需要幾秒鐘的時間</p>
        <div class="space-y-3 mt-6 text-left" id="export-steps"></div>
      </div>
    </div>
  </div>

  <script>
    // --- 基礎設定與常數 ---
    const delay = ms => new Promise(resolve => setTimeout(resolve, ms));
    const iconMap = { sightseeing: 'camera', shopping: 'shopping-bag', dining: 'utensils', nature: 'compass', cafe: 'coffee', culture: 'ticket', accommodation: 'home', event: 'anchor', default: 'map-pin' };
    const tipStyleMap = { 
      info: { icon: 'info', color: 'text-blue-700 bg-blue-50 border-blue-200' }, 
      warning: { icon: 'alert-circle', color: 'text-amber-700 bg-amber-50 border-amber-200' }, 
      ticket: { icon: 'ticket', color: 'text-purple-700 bg-purple-50 border-purple-200' }, 
      success: { icon: 'check-circle', color: 'text-emerald-700 bg-emerald-50 border-emerald-200' }, 
      default: { icon: 'info', color: 'text-slate-700 bg-slate-50 border-slate-200' } 
    };

    const dietaryOptions = ['素食/蔬食', '純素食', '不吃牛', '清真認證'];
    const interestOptions = [{id: 'photography', label: '📸 攝影/取景'}, {id: 'culture', label: '🏛️ 深度人文'}, {id: 'shopping', label: '🛍️ 盡情購物'}, {id: 'relax', label: '💆 悠閒放鬆'}];
    
    // Fallback 地點預設備用經緯度 (以碧瑤/馬尼拉附近為例)
    const fallbackBaseLat = 16.4023;
    const fallbackBaseLng = 120.5960;

    let leafletMap = null;
    let polylineLayer = null;
    let markerLayers = [];

    // --- 全域狀態 ---
    let state = {
      formData: {
        destination: '', days: 3, partySize: '2', accommodationStatus: 'unknown',
        accommodations: [''], dietary: [], interests: [], fixedEvents: []
      },
      currentTrip: null,
      originalTrip: null,
      swapPool: {},
      selectedActivityId: null,
      isEditing: false
    };

    // --- 初始化 ---
    document.addEventListener('DOMContentLoaded', () => {
      // 讀取本地儲存的 API Key
      const savedKey = localStorage.getItem('gemini_api_key');
      if (savedKey) document.getElementById('input-api-key').value = savedKey;

      renderToggles();
      renderAccFields();
      renderFixedEvents();
      lucide.createIcons();
    });

    function switchView(viewName) {
      document.getElementById('view-form').classList.add('hidden');
      document.getElementById('view-loading').classList.add('hidden');
      document.getElementById('view-dashboard').classList.add('hidden');
      document.getElementById(`view-${viewName}`).classList.remove('hidden');
      
      if(viewName === 'form') window.scrollTo(0,0);
      if(viewName === 'dashboard') {
        // 等待 DOM 渲染後初始化地圖
        setTimeout(() => initRealMap(), 100);
      }
    }

    // --- 表單邏輯 ---
    function updateAccStatus(status) {
      state.formData.accommodationStatus = status;
      const container = document.getElementById('acc-container');
      status === 'known' ? container.classList.remove('hidden') : container.classList.add('hidden');
    }
    function addAccField() { state.formData.accommodations.push(''); renderAccFields(); }
    function removeAccField(idx) { state.formData.accommodations.splice(idx, 1); if (!state.formData.accommodations.length) state.formData.accommodations.push(''); renderAccFields(); }
    function handleAccInput(idx, val) { state.formData.accommodations[idx] = val; }
    function renderAccFields() {
      document.getElementById('acc-list').innerHTML = state.formData.accommodations.map((acc, idx) => `
        <div class="flex gap-2">
          <input type="text" value="${acc}" onchange="handleAccInput(${idx}, this.value)" placeholder="飯店名稱或地址 ${idx + 1}" class="w-full px-4 py-2.5 rounded-lg border-2 border-slate-200 focus:border-blue-500 text-sm font-medium" />
          ${state.formData.accommodations.length > 1 ? `<button type="button" onclick="removeAccField(${idx})" class="p-2.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-lg transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>` : ''}
        </div>
      `).join('');
      lucide.createIcons();
    }

    function toggleArrayItem(field, val) {
      const idx = state.formData[field].indexOf(val);
      if (idx > -1) state.formData[field].splice(idx, 1); else state.formData[field].push(val);
      renderToggles();
    }
    function renderToggles() {
      document.getElementById('interests-container').innerHTML = interestOptions.map(opt => `<button type="button" onclick="toggleArrayItem('interests', '${opt.id}')" class="px-4 py-2 rounded-lg text-sm transition-all border-2 font-medium ${state.formData.interests.includes(opt.id) ? 'bg-blue-600 border-blue-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}">${opt.label}</button>`).join('');
      document.getElementById('dietary-container').innerHTML = dietaryOptions.map(opt => `<button type="button" onclick="toggleArrayItem('dietary', '${opt}')" class="px-4 py-2 rounded-lg text-sm transition-all border-2 font-medium ${state.formData.dietary.includes(opt) ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'}">${opt}</button>`).join('');
    }

    function getSafeDays() { const d = parseInt(document.getElementById('input-days').value); return (d > 0 && d <= 14) ? d : 3; }
    function addFixedEvent() { state.formData.fixedEvents.push({ day: 1, time: '12:00', name: '' }); renderFixedEvents(); }
    function updateFixedEvent(idx, field, val) { state.formData.fixedEvents[idx][field] = val; }
    function removeFixedEvent(idx) { state.formData.fixedEvents.splice(idx, 1); renderFixedEvents(); }
    function renderFixedEvents() {
      const days = getSafeDays();
      const optionsHtml = Array.from({length: days}, (_, i) => i + 1).map(d => `<option value="${d}">第 ${d} 天</option>`).join('');
      document.getElementById('fixed-events-list').innerHTML = state.formData.fixedEvents.map((evt, idx) => `
        <div class="flex gap-2 items-center bg-amber-50 p-3 rounded-xl border border-amber-200 flex-wrap">
          <select onchange="updateFixedEvent(${idx}, 'day', this.value)" class="w-24 px-2 py-2 rounded-lg border border-slate-200 text-sm font-medium">${optionsHtml.replace(`value="${evt.day}"`, `value="${evt.day}" selected`)}</select>
          <input type="time" value="${evt.time}" onchange="updateFixedEvent(${idx}, 'time', this.value)" class="w-28 px-2 py-2 rounded-lg border border-slate-200 text-sm font-medium" />
          <input type="text" value="${evt.name}" onchange="updateFixedEvent(${idx}, 'name', this.value)" placeholder="事件名稱" class="flex-1 px-3 py-2 rounded-lg border border-slate-200 text-sm font-medium min-w-[120px]" />
          <button type="button" onclick="removeFixedEvent(${idx})" class="text-slate-400 hover:text-rose-600 transition-colors p-2"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
      `).join('');
      lucide.createIcons();
    }



    // --- AI 與 Fallback ---
    async function handleGenerate(e) {
      e.preventDefault();
      const apiKeyInput = document.getElementById('input-api-key').value.trim();
      if (!apiKeyInput) return alert('請輸入您的 Gemini API Key 以啟用真實搜尋');
      localStorage.setItem('gemini_api_key', apiKeyInput); // 儲存金鑰

      state.formData.destination = document.getElementById('input-destination').value;
      state.formData.days = parseInt(document.getElementById('input-days').value) || 3;
      state.formData.partySize = document.getElementById('input-partySize').value;
      
      showLoading();
      window.scrollTo(0, 0);
      
      state.swapPool = {};
      state.originalTrip = null;

      try {
        const rawTrip = await callGeminiAPI(state.formData, apiKeyInput);
        finishGenerate(formatTripData(rawTrip));
      } catch (error) {
        showLoadingError(error.message);
        setTimeout(() => {
          const mockTrip = formatTripData(generateFallback(state.formData));
          finishGenerate(mockTrip);
        }, 3000);
      }
    }

    function showLoading() {
      switchView('loading');
      document.getElementById('loading-error-box').classList.add('hidden');
      document.getElementById('loading-icon').setAttribute('data-lucide', 'sparkles');
      document.getElementById('loading-icon').classList.replace('text-rose-500', 'text-blue-300');
      document.getElementById('loading-spinner').classList.remove('hidden');
      document.getElementById('loading-title').innerText = "正在為您搜尋真實推薦...";
      document.getElementById('loading-text1').style.display = 'block';
      document.getElementById('loading-text2').style.display = 'block';
      lucide.createIcons();
    }
    function showLoadingError(msg) {
      document.getElementById('loading-icon').setAttribute('data-lucide', 'alert-circle');
      document.getElementById('loading-icon').classList.replace('text-blue-300', 'text-rose-500');
      document.getElementById('loading-spinner').classList.add('hidden');
      document.getElementById('loading-title').innerText = "API 連線或解析異常";
      document.getElementById('loading-text1').style.display = 'none';
      document.getElementById('loading-text2').style.display = 'none';
      document.getElementById('loading-error-box').classList.remove('hidden');
      document.getElementById('loading-error-msg').innerText = msg;
      lucide.createIcons();
    }
    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function finishGenerate(tripData) {
      // 計算目的地中心點座標（平均所有活動的 lat/lng）
      const allActs = (tripData.schedule || []).flatMap(day => day.activities || []);
      const validActs = allActs.filter(a => typeof a.lat === 'number' && typeof a.lng === 'number');
      const baseLat = validActs.length > 0 ? validActs.reduce((s, a) => s + a.lat, 0) / validActs.length : fallbackBaseLat;
      const baseLng = validActs.length > 0 ? validActs.reduce((s, a) => s + a.lng, 0) / validActs.length : fallbackBaseLng;

      state.currentTrip = tripData;
      state.swapPool = validateSwapPool(tripData.swapPool || {}, baseLat, baseLng);
      console.log('[swapPool] state.swapPool:', state.swapPool);
      state.originalTrip = deepClone(tripData);
      state.isEditing = false;
      if (tripData.schedule[0]?.activities[0]) state.selectedActivityId = tripData.schedule[0].activities[0].instanceId;
      renderDashboard();
      switchView('dashboard');
    }

    async function callGeminiAPI(data, key) {
      // 從 meta tag 讀取模型名稱，確保即使 JS 被快取也能拿到最新值
      const MODEL = document.querySelector('meta[name="gemini-model"]')?.content || 'gemini-2.5-flash';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`;
      // 防呆：確保不使用已廢棄的 preview 端點
      if (MODEL.includes('preview')) throw new Error(`[Config Error] 模型 "${MODEL}" 為 preview 版本，請改用正式 GA 模型。`);
      const fixedDesc = data.fixedEvents.length > 0 ? data.fixedEvents.map(e => `第${e.day}天${e.time}有不可變動行程：「${e.name}」`).join('；') : '無';
      const promptText = `
        你是一位極度專業的旅遊規劃師。請使用 Google Search 搜尋真實資料，為「${data.destination}」規劃 ${data.days} 天行程。以繁體中文 (zh-TW) 回覆。
        約束條件：人數：${data.partySize}。飲食：${data.dietary.length ? data.dietary.join('、') : '無'}。興趣：${data.interests.length ? data.interests.join('、') : '一般'}。絕對錨點：${fixedDesc}。
        重點：請務必在 lat 與 lng 欄位給予該景點真實的 GPS 經緯度座標 (浮點數)，以便在地圖上渲染。
        同時，請在 JSON 根層級加入一個 "swapPool" 物件，結構為以 type 為鍵、地點陣列為值。
        每個 type 分類至少包含 3 個備選地點，每個地點須包含 name、type、time、duration、rating、desc、lat、lng、tips 欄位。
        type 的允許值與 schedule 相同：sightseeing, shopping, dining, nature, cafe, culture, accommodation, event。
        【嚴格規定】只允許輸出一個 JSON 物件，嚴禁包含任何 Markdown 標記 (如 \`\`\`json) 或其他說明文字！直接輸出純 JSON，第一個字元必須是 {，最後一個字元必須是 }。
        強制輸出格式：
        {"schedule":[{"day":1,"date":"Day 1","activities":[{"name":"真實地點名稱","type":"sightseeing, shopping, dining, nature, cafe, culture, accommodation, event 之一","time":"HH:MM","duration":"停留時間","rating":"評分","desc":"介紹","lat":真實緯度浮點數,"lng":真實經度浮點數,"tips":[{"text":"注意事項","category":"info, warning, ticket, success 之一"}]}]}],"swapPool":{"sightseeing":[{"name":"備選地點名稱","type":"sightseeing","time":"HH:MM","duration":"停留時間","rating":"評分","desc":"介紹","lat":真實緯度浮點數,"lng":真實經度浮點數,"tips":[]}]}}
      `;
      // 注意：google_search tool 與 responseMimeType: "application/json" 不相容，必須移除 responseMimeType
      const payload = { contents: [{ parts: [{ text: promptText }] }], tools: [{ google_search: {} }], generationConfig: { temperature: 0.1 } };
      let lastErr;
      for (let i = 0; i < 3; i++) {
        try {
          const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          const json = await res.json();
          if (!res.ok) throw new Error(json.error?.message || "HTTP Error");
          let text = json.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!text) throw new Error("無文字回傳");
          let f = text.indexOf('{'), l = text.lastIndexOf('}');
          if (f !== -1 && l !== -1) text = text.substring(f, l + 1);
          const parsed = JSON.parse(text);
          if (!parsed.schedule) throw new Error("無 schedule 陣列");
          return { id: `trip-${Date.now()}`, destination: data.destination, schedule: parsed.schedule, swapPool: parsed.swapPool || {}, isMock: false };
        } catch(e) { lastErr = e; if (i === 2) break; await delay(1500 * (i + 1)); }
      }
      throw lastErr;
    }

    function generateFallback(data) {
      const sch = [];
      const days = getSafeDays();
      for (let i = 1; i <= days; i++) {
        const acts = [];
        const isPhoto = data.interests.includes('photography');
        
        // 假資料也配上接近碧瑤的座標，加上亂數偏移
        const genLat = () => fallbackBaseLat + (Math.random() - 0.5) * 0.05;
        const genLng = () => fallbackBaseLng + (Math.random() - 0.5) * 0.05;

        if (data.accommodationStatus === 'known' && data.accommodations[0]) acts.push({ name: `出發: ${data.accommodations[0]}`, type: 'accommodation', time: '09:00', duration: '--', rating: '-', desc: '住宿點出發。', lat: genLat(), lng: genLng(), tips: [] });
        acts.push({ name: isPhoto ? '晨間絕美觀景台' : '市區文化廣場', type: 'sightseeing', time: isPhoto ? '07:30' : '10:30', duration: '2.5小時', rating: '4.8', desc: '絕佳體驗', lat: genLat(), lng: genLng(), tips: isPhoto ? [{text: '黃金時刻', category: 'info'}] : [] });
        acts.push({ name: '人氣在地餐館', type: 'dining', time: '13:00', duration: '1.5小時', rating: '4.6', desc: '地道美味', lat: genLat(), lng: genLng(), tips: [] });
        acts.push({ name: '午後藝術特區', type: 'culture', time: isPhoto ? '16:30' : '15:00', duration: '2小時', rating: '4.7', desc: '豐富文化。', lat: genLat(), lng: genLng(), tips: [] });
        if (data.accommodationStatus === 'known' && data.accommodations[0]) acts.push({ name: `返回: ${data.accommodations[0]}`, type: 'accommodation', time: '19:30', duration: '--', rating: '-', desc: '結束一天。', lat: genLat(), lng: genLng(), tips: [] });
        
        acts.sort((a,b) => a.time.localeCompare(b.time));
        sch.push({ day: i, date: `Day ${i}`, activities: acts });
      }
      return { id: `trip-mock-${Date.now()}`, destination: data.destination, schedule: sch, isMock: true, days: days };
    }

    function formatTripData(raw) {
      return {
        ...raw,
        schedule: (raw.schedule || []).map(day => ({
          ...day,
          activities: (day.activities || []).map(act => ({
            ...act,
            instanceId: (act.instanceId && act.instanceId !== '') ? act.instanceId : (act.id || `act-${Math.random().toString(36).substr(2, 9)}`),
            icon: iconMap[act.type] || iconMap.default,
            // 確保有經緯度，否則賦予預設
            lat: typeof act.lat === 'number' ? act.lat : fallbackBaseLat + (Math.random()-0.5)*0.05,
            lng: typeof act.lng === 'number' ? act.lng : fallbackBaseLng + (Math.random()-0.5)*0.05,
            mappedTips: (act.tips || []).map(t => ({ text: t.text, ...(tipStyleMap[t.category] || tipStyleMap.default) }))
          }))
        }))
      };
    }

    function validateSwapPool(rawSwapPool, baseLat, baseLng) {
      const result = {};
      if (!rawSwapPool || typeof rawSwapPool !== 'object') return result;
      Object.keys(rawSwapPool).forEach(type => {
        const items = Array.isArray(rawSwapPool[type]) ? rawSwapPool[type] : [];
        const validated = items
          .filter(item => item && typeof item.name === 'string' && item.name.trim() !== '')
          .map(item => {
            const lat = (typeof item.lat === 'number' && !isNaN(item.lat)) ? item.lat : baseLat + (Math.random() - 0.5) * 0.1;
            const lng = (typeof item.lng === 'number' && !isNaN(item.lng)) ? item.lng : baseLng + (Math.random() - 0.5) * 0.1;
            return {
              ...item,
              lat,
              lng,
              instanceId: `act-${Date.now()}-${Math.random().toString(36).substr(2, 5)}`,
              icon: iconMap[item.type] || iconMap.default,
              mappedTips: (item.tips || []).map(t => ({ text: t.text, ...(tipStyleMap[t.category] || tipStyleMap.default) }))
            };
          });
        if (validated.length > 0) result[type] = validated;
      });
      return result;
    }

    // --- 真實地圖 (Leaflet) 邏輯 ---
    function initRealMap() {
      if (leafletMap) leafletMap.remove(); // 清除舊地圖
      
      leafletMap = L.map('real-map').setView([fallbackBaseLat, fallbackBaseLng], 13);
      
      // 使用開源 OpenStreetMap 圖資
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(leafletMap);

      updateMapMarkers();
    }

    function updateMapMarkers() {
      if (!leafletMap || !state.currentTrip) return;

      // 清除舊圖層
      if (polylineLayer) leafletMap.removeLayer(polylineLayer);
      markerLayers.forEach(m => leafletMap.removeLayer(m));
      markerLayers = [];

      let latlngs = [];
      
      state.currentTrip.schedule.forEach(day => {
        day.activities.forEach(act => {
          if (act.lat && act.lng) {
            latlngs.push([act.lat, act.lng]);
            const isSel = state.selectedActivityId === act.instanceId;
            const isAcc = act.type === 'accommodation';
            const isEvent = act.type === 'event';
            
            // 自訂 HTML Marker 結合 Tailwind 與 Lucide
            const markerHtml = `
              <div class="relative group flex flex-col items-center focus:outline-none" style="margin-top: -24px; margin-left: -16px;">
                <div class="whitespace-nowrap px-3 py-1.5 rounded-lg shadow-lg text-xs font-bold mb-2 transition-all border ${isSel ? 'bg-blue-600 border-blue-600 text-white opacity-100 translate-y-0 scale-110' : 'bg-white border-slate-200 text-slate-700 opacity-0 group-hover:opacity-100 translate-y-2'}">
                  ${act.name}
                </div>
                <div class="p-2.5 rounded-full shadow-md border-4 transition-all duration-300 ${isSel ? 'bg-blue-600 border-white text-white scale-125 shadow-xl' : isAcc ? 'bg-slate-300 border-white text-white' : isEvent ? 'bg-amber-500 border-white text-white' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-400'}">
                  <i data-lucide="${act.icon}" class="w-4 h-4"></i>
                </div>
              </div>
            `;
            
            const customIcon = L.divIcon({ className: 'custom-map-marker', html: markerHtml, iconSize: [32, 48] });
            const marker = L.marker([act.lat, act.lng], { icon: customIcon }).addTo(leafletMap);
            
            marker.on('click', () => selectActivity(act.instanceId));
            markerLayers.push(marker);
          }
        });
      });

      // 繪製路徑
      if (latlngs.length > 0) {
        polylineLayer = L.polyline(latlngs, { color: '#3b82f6', weight: 4, opacity: 0.6, dashArray: '8, 8' }).addTo(leafletMap);
        leafletMap.fitBounds(polylineLayer.getBounds(), { padding: [50, 50] }); // 自動縮放包含所有點
      }
      
      lucide.createIcons();
    }

    // --- Dashboard 互動 ---
    function toggleEditing() {
      state.isEditing = !state.isEditing;
      const btn = document.getElementById('btn-edit');
      if (state.isEditing) {
        btn.classList.replace('bg-slate-100', 'bg-amber-100');
        btn.classList.replace('text-slate-700', 'text-amber-800');
        btn.innerHTML = `<i data-lucide="edit" class="w-4 h-4"></i> <span>完成編輯</span>`;
        document.getElementById('edit-badge').classList.remove('hidden');
      } else {
        btn.classList.replace('bg-amber-100', 'bg-slate-100');
        btn.classList.replace('text-amber-800', 'text-slate-700');
        btn.innerHTML = `<i data-lucide="edit" class="w-4 h-4"></i> <span>微調行程</span>`;
        document.getElementById('edit-badge').classList.add('hidden');
      }
      renderDashboard();
    }

    function selectActivity(id) {
      state.selectedActivityId = id;
      renderDashboard();
      
      // 地圖平滑飛越 (FlyTo)
      let selAct = null;
      state.currentTrip.schedule.forEach(d => d.activities.forEach(a => { if(a.instanceId === id) selAct = a; }));
      if (selAct && leafletMap) {
        leafletMap.flyTo([selAct.lat, selAct.lng], 15, { duration: 1.5 });
      }
    }

    function deleteActivity(dayIdx, actIdx) {
      state.currentTrip.schedule[dayIdx].activities.splice(actIdx, 1);
      renderDashboard();
    }

    function showExhaustedDialog() {
      alert('目前沒有更多備選地點可供替換。');
    }

    function swapActivity(dayIdx, actIdx) {
      const oldAct = state.currentTrip.schedule[dayIdx].activities[actIdx];
      // 產生附近隨機座標
      const newLat = oldAct.lat + (Math.random()-0.5)*0.02;
      const newLng = oldAct.lng + (Math.random()-0.5)*0.02;

      // 取得當天行程中已有的地點名稱集合，用於排除重複
      const todayNames = new Set(
        state.currentTrip.schedule[dayIdx].activities.map(a => a.name)
      );

      let candidate = null;

      // 優先從 state.swapPool[oldAct.type] 取出第一個不在當天行程中的地點
      const pool = state.swapPool[oldAct.type];
      if (pool && pool.length > 0) {
        const idx = pool.findIndex(item => !todayNames.has(item.name));
        if (idx !== -1) {
          candidate = pool.splice(idx, 1)[0];
        }
      }

      // 耗盡處理
      if (!candidate) {
        showExhaustedDialog();
        return;
      }

      const newAct = {
        ...candidate, instanceId: `swap-${Date.now()}`, time: oldAct.time,
        lat: newLat, lng: newLng, icon: iconMap[candidate.type] || iconMap.default,
        mappedTips: (candidate.tips || []).map(t => ({ text: t.text, ...(tipStyleMap[t.category] || tipStyleMap.default) }))
      };

      state.currentTrip.schedule[dayIdx].activities[actIdx] = newAct;
      selectActivity(newAct.instanceId);
    }

    function renderDashboard() {
      const trip = state.currentTrip;
      if (!trip) return;

      document.getElementById('dash-dest').innerText = trip.destination;
      let tagsHtml = `<span>${state.formData.days || trip.days} 天</span>•`;
      if (trip.isMock) tagsHtml += `<span class="flex items-center gap-1 text-amber-600 bg-amber-50 px-2 rounded-md"><i data-lucide="alert-circle" class="w-3 h-3"></i> 備用測試資料</span>`;
      else tagsHtml += `<span class="flex items-center gap-1 text-blue-600 bg-blue-50 px-2 rounded-md"><i data-lucide="sparkles" class="w-3 h-3"></i> 真實資料</span>`;
      document.getElementById('dash-tags').innerHTML = tagsHtml;

      // 渲染 Timeline
      let timeHtml = '';
      trip.schedule.forEach((dayData, dIdx) => {
        timeHtml += `<div class="relative"><h3 class="text-lg font-black text-slate-900 mb-4 sticky top-0 bg-white/95 backdrop-blur-sm py-3 z-10 border-b-2 border-slate-100"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm">${dayData.date}</span></h3><div class="space-y-4 pl-3 border-l-2 border-slate-100 ml-3">`;
        
        dayData.activities.forEach((act, aIdx) => {
          const isSel = state.selectedActivityId === act.instanceId;
          const isAcc = act.type === 'accommodation';
          const isEvent = act.type === 'event';
          
          let tipsHtml = '';
          if(act.mappedTips) {
            tipsHtml = `<div class="flex flex-wrap gap-2 mt-2">` + act.mappedTips.map(t => `<span class="text-xs px-2 py-1 rounded-md border flex items-center gap-1.5 ${t.color}"><i data-lucide="${t.icon}" class="w-3 h-3"></i> ${t.text}</span>`).join('') + `</div>`;
          }

          let editHtml = '';
          if (state.isEditing && !isAcc && !isEvent) {
            editHtml = `<div class="flex gap-2 mt-4 pt-3 border-t border-slate-100">
              <button onclick="swapActivity(${dIdx}, ${aIdx})" class="text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors"><i data-lucide="refresh-cw" class="w-3 h-3"></i> 換一個</button>
              <button onclick="deleteActivity(${dIdx}, ${aIdx})" class="text-xs font-bold text-rose-600 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors"><i data-lucide="trash" class="w-3 h-3"></i> 刪除</button>
            </div>`;
          }

          timeHtml += `
            <div class="relative pl-6 py-4 pr-4 rounded-2xl transition-all duration-300 ${isSel ? 'bg-blue-50/50 border border-blue-100 shadow-sm' : 'hover:bg-slate-50 border border-transparent'}">
              <div class="absolute -left-[11px] top-6 w-5 h-5 rounded-full border-4 bg-white transition-colors cursor-pointer ${isSel ? 'border-blue-600' : 'border-slate-200'}" onclick="selectActivity('${act.instanceId}')"></div>
              <div class="flex items-start gap-4">
                <div class="flex flex-col items-center gap-2 cursor-pointer" onclick="selectActivity('${act.instanceId}')">
                  <span class="text-sm font-bold ${isEvent ? 'text-amber-600' : 'text-slate-700'}">${act.time}</span>
                  <div class="p-2.5 rounded-xl ${isSel ? 'bg-blue-600 text-white shadow-md' : isAcc ? 'bg-slate-200 text-slate-600' : isEvent ? 'bg-amber-500 text-white shadow-md animate-pulse' : 'bg-slate-100 text-slate-500'}">
                    <i data-lucide="${act.icon}" class="w-5 h-5"></i>
                  </div>
                </div>
                <div class="flex-1">
                  <h4 class="font-bold text-base mb-1 cursor-pointer ${isSel ? 'text-blue-900' : isEvent ? 'text-amber-700' : 'text-slate-800'}" onclick="selectActivity('${act.instanceId}')">${act.name}</h4>
                  <p class="text-sm text-slate-500 mb-3">${act.desc || ''}</p>
                  ${tipsHtml}
                  ${editHtml}
                </div>
              </div>
            </div>`;
        });
        timeHtml += `</div></div>`;
      });
      document.getElementById('timeline-container').innerHTML = timeHtml;

      // 更新地圖標記 (僅在地圖已初始化時執行，避免重複呼叫)
      if (leafletMap) updateMapMarkers();
    }

    // --- 真實 PDF 匯出邏輯 (整合 html2pdf.js) ---
    async function handleExportPDF() {
      const modal = document.getElementById('export-modal');
      const stepsDiv = document.getElementById('export-steps');
      modal.classList.remove('hidden');
      
      const updateStep = (step) => {
        stepsDiv.innerHTML = `
          <div class="flex items-center gap-3 text-sm font-medium ${step >= 1 ? 'text-slate-800' : 'text-slate-400'}">
            ${step > 1 ? '<i data-lucide="check-circle" class="w-5 h-5 text-emerald-500"></i>' : '<div class="w-5 h-5 border-2 border-slate-300 rounded-full animate-spin border-t-transparent"></div>'} 擷取行程時間軸佈局
          </div>
          <div class="flex items-center gap-3 text-sm font-medium ${step >= 2 ? 'text-slate-800' : 'text-slate-400'}">
            ${step > 2 ? '<i data-lucide="check-circle" class="w-5 h-5 text-emerald-500"></i>' : step === 2 ? '<div class="w-5 h-5 border-2 border-slate-300 rounded-full animate-spin border-t-transparent"></div>' : '<div class="w-5 h-5 border-2 border-slate-200 rounded-full"></div>'} 轉換為高畫質圖片
          </div>
          <div class="flex items-center gap-3 text-sm font-medium ${step >= 3 ? 'text-slate-800' : 'text-slate-400'}">
            ${step > 3 ? '<i data-lucide="check-circle" class="w-5 h-5 text-emerald-500"></i>' : step === 3 ? '<i data-lucide="check-circle" class="w-5 h-5 text-emerald-500"></i>' : '<div class="w-5 h-5 border-2 border-slate-200 rounded-full"></div>'} 封裝並下載 PDF
          </div>
        `;
        lucide.createIcons();
      };

      updateStep(1);
      await delay(500);
      
      // 設定 PDF 選項
      const element = document.getElementById('pdf-content');
      const destName = state.currentTrip.destination.replace(/\s+/g, '');
      const opt = {
        margin:       10,
        filename:     `${destName}_專屬行程表.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, scrollY: 0 },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      updateStep(2);
      
      // 執行轉換 (利用 html2pdf.js)
      try {
        await html2pdf().set(opt).from(element).save();
        updateStep(3);
        await delay(800);
      } catch (err) {
        console.error("PDF 匯出失敗", err);
        alert("PDF 匯出過程中發生錯誤。");
      } finally {
        modal.classList.add('hidden');
      }
    }

  </script>

  <!-- fast-check: 屬性測試函式庫 -->
  <script src="https://cdn.jsdelivr.net/npm/fast-check/lib/bundle/fast-check.min.js"></script>
  <script>
    // ===== 屬性測試區塊 =====
    // 僅在 URL 含有 ?runTests 時自動執行，或呼叫 window.runPropertyTests() 手動觸發

    window.runPropertyTests = function() {
      const baseLat = 25.0;
      const baseLng = 121.5;

      // arbitraryRawActivity：產生可能缺少 name 欄位的原始活動物件
      const arbitraryRawActivity = fc.record({
        name: fc.oneof(
          fc.constant(undefined),
          fc.constant(''),
          fc.constant(null),
          fc.string({ minLength: 1, maxLength: 30 })
        ),
        type: fc.constantFrom('sightseeing', 'dining', 'cafe', 'shopping', 'culture', 'nature', 'accommodation', 'event'),
        lat: fc.oneof(fc.double({ min: 20, max: 30, noNaN: true }), fc.constant(undefined)),
        lng: fc.oneof(fc.double({ min: 115, max: 130, noNaN: true }), fc.constant(undefined)),
        duration: fc.string(),
        rating: fc.string(),
        desc: fc.string(),
        tips: fc.array(fc.record({ text: fc.string(), category: fc.string() }))
      }, { withDeletedKeys: false });

      // arbitraryActivityWithoutCoords：產生有效 name 但缺少有效 lat/lng 的活動物件
      const arbitraryActivityWithoutCoords = fc.record({
        name: fc.string({ minLength: 1, maxLength: 30 }),
        type: fc.constantFrom('sightseeing', 'dining', 'cafe', 'shopping', 'culture', 'nature', 'accommodation', 'event'),
        lat: fc.oneof(fc.constant(undefined), fc.constant(null), fc.constant('invalid'), fc.constant(NaN)),
        lng: fc.oneof(fc.constant(undefined), fc.constant(null), fc.constant('invalid'), fc.constant(NaN)),
        duration: fc.string(),
        rating: fc.string(),
        desc: fc.string(),
        tips: fc.array(fc.record({ text: fc.string(), category: fc.string() }))
      }, { withDeletedKeys: false });

      // Feature: gemini-itinerary-swap, Property 4: 無名稱地點被排除
      // Validates: Requirements 3.3
      try {
        fc.assert(fc.property(
          fc.array(arbitraryRawActivity),
          (items) => {
            const result = validateSwapPool({ sightseeing: items }, baseLat, baseLng);
            return (result.sightseeing || []).every(a => typeof a.name === 'string' && a.name.length > 0);
          }
        ), { numRuns: 20 });
        console.log('[PBT] Property 4 通過：無名稱地點被排除 ✓');
      } catch (e) {
        console.error('[PBT] Property 4 失敗：', e);
        throw e;
      }

      // Feature: gemini-itinerary-swap, Property 5: 無效座標補全後為數字
      // Validates: Requirements 3.2
      try {
        fc.assert(fc.property(
          fc.array(arbitraryActivityWithoutCoords),
          (items) => {
            const result = validateSwapPool({ dining: items }, baseLat, baseLng);
            return (result.dining || []).every(a =>
              typeof a.lat === 'number' && typeof a.lng === 'number' &&
              Math.abs(a.lat - baseLat) <= 0.05 && Math.abs(a.lng - baseLng) <= 0.05
            );
          }
        ), { numRuns: 20 });
        console.log('[PBT] Property 5 通過：無效座標補全後為數字 ✓');
      } catch (e) {
        console.error('[PBT] Property 5 失敗：', e);
        throw e;
      }

      // arbitraryTripData：產生含有至少一個活動的行程資料
      const arbitraryActivity = fc.record({
        name: fc.string({ minLength: 1, maxLength: 30 }),
        type: fc.constantFrom('sightseeing', 'dining', 'cafe', 'shopping', 'culture', 'nature', 'accommodation', 'event'),
        time: fc.string(),
        duration: fc.string(),
        rating: fc.string(),
        desc: fc.string(),
        lat: fc.double({ min: 20, max: 30, noNaN: true }),
        lng: fc.double({ min: 115, max: 130, noNaN: true }),
        tips: fc.array(fc.record({ text: fc.string(), category: fc.string() }))
      });
      const arbitraryTripData = fc.record({
        id: fc.string(),
        destination: fc.string(),
        isMock: fc.boolean(),
        schedule: fc.array(
          fc.record({
            day: fc.integer({ min: 1, max: 7 }),
            date: fc.string(),
            activities: fc.array(arbitraryActivity, { minLength: 1 })
          }),
          { minLength: 1 }
        )
      });

      // Feature: gemini-itinerary-swap, Property 6: swapPool 永遠為物件
      // Validates: Requirements 4.3
      try {
        fc.assert(fc.property(
          fc.option(fc.record({ swapPool: fc.option(fc.object()) })),
          (tripData) => {
            finishGenerate(tripData || {});
            return state.swapPool !== null && state.swapPool !== undefined && typeof state.swapPool === 'object';
          }
        ), { numRuns: 20 });
        console.log('[PBT] Property 6 通過：swapPool 永遠為物件 ✓');
      } catch (e) {
        console.error('[PBT] Property 6 失敗：', e);
        throw e;
      }

      // Feature: gemini-itinerary-swap, Property 8: 恢復原始建議為深層複本
      // Validates: Requirements 5.6
      try {
        fc.assert(fc.property(
          arbitraryTripData,
          (tripData) => {
            finishGenerate(tripData);
            const originalName = state.originalTrip.schedule[0].activities[0].name;
            state.currentTrip.schedule[0].activities[0].name = 'MUTATED';
            return state.originalTrip.schedule[0].activities[0].name === originalName;
          }
        ), { numRuns: 20 });
        console.log('[PBT] Property 8 通過：恢復原始建議為深層複本 ✓');
      } catch (e) {
        console.error('[PBT] Property 8 失敗：', e);
        throw e;
      }
    };

    if (window.location.search.includes('runTests')) {
      window.runPropertyTests();
    }
  </script>
