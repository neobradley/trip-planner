# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DEPLOY_OUTCOME: ${{ steps.deployment.outcome }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          # Dynamically fetch the latest chat ID from the bot's received messages
          UPDATES=$(curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?limit=1&offset=-1") || {
            echo "::warning::Failed to reach Telegram API for getUpdates. Check TELEGRAM_BOT_TOKEN."
            exit 0
          }

          CHAT_ID=$(echo "$UPDATES" | jq -r '
            (.result[-1].message.chat.id //
             .result[-1].channel_post.chat.id //
             .result[-1].my_chat_member.chat.id //
             empty) | tostring' 2>/dev/null || echo "")

          if [ -z "$CHAT_ID" ] || [ "$CHAT_ID" = "null" ]; then
            echo "::warning::No chat ID found in bot updates. Send at least one message to the bot, then re-run."
            exit 0
          fi

          # Build status text
          if [ "$DEPLOY_OUTCOME" = "success" ]; then
            STATUS="✅ succeeded"
            EXTRA="🌐 Page URL: ${PAGE_URL}"
          else
            STATUS="❌ failed"
            EXTRA=""
          fi

          # Compose and send the notification via Telegram Bot API
          PAYLOAD=$(jq -n \
            --arg chat_id "$CHAT_ID" \
            --arg status "$STATUS" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT" \
            --arg extra "$EXTRA" \
            --arg actor "$ACTOR" \
            '{
              chat_id: $chat_id,
              parse_mode: "Markdown",
              text: ("📦 Deploy " + $status + " for *" + $repo + "*\nBranch: `" + $branch + "`\nCommit: " + $commit + (if $extra != "" then "\n" + $extra else "" end) + "\nTriggered by: " + $actor)
            }')

          RESPONSE=$(curl -sf -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD") || {
            echo "::warning::Failed to send Telegram notification. Check bot token and chat ID."
            exit 0
          }

          if ! echo "$RESPONSE" | jq -e '.ok == true' > /dev/null 2>&1; then
            echo "::warning::Telegram API returned an error: $(echo "$RESPONSE" | jq -r '.description // "unknown error"')"
          else
            echo "✅ Telegram notification sent successfully."
          fi
